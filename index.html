<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Splendor Disco | Oficial</title>

    <meta property="og:title" content="Splendor Disco Oficial">
    <meta property="og:description" content="La radio y plataforma viral más potente de 2026.">
    <meta property="og:image" content="https://i.postimg.cc/85PR3cTQ/gvkgv.png">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/85PR3cTQ/gvkgv.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { --red: #ff0000; --bg: #ffffff; --text: #1a1a1a; --card: #f4f4f4; --border: rgba(0,0,0,0.1); }
        body.dark-mode { --bg: #0d0d0d; --text: #ffffff; --card: #1a1a1a; --border: rgba(255,255,255,0.1); }
        
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; transition: 0.3s; margin:0; overflow-x: hidden; }
        
        /* Slider con difuminado suave */
        .hero { width: 100%; height: 70vh; position: relative; }
        .hero::after { 
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 35%;
            background: linear-gradient(transparent, var(--bg)); z-index: 10;
        }
        .hero img { width: 100%; height: 100%; object-fit: cover; object-position: top; }

        /* Cabecera bajada y logo sin bordes */
        .header-main { position: relative; margin-top: -60px; padding: 0 6%; display: flex; align-items: center; justify-content: center; gap: 20px; z-index: 100; }
        .heart-box { width: 160px; height: 160px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .heart-box img { width: 100%; height: 100%; object-fit: contain; }
        
        @media (min-width: 1024px) { 
            .hero { height: 85vh; } 
            .header-main { margin-top: -150px; gap: 40px; } 
            .heart-box { width: 450px; height: 450px; } 
        }

        .block-title { font-size: 24px; font-weight: 900; text-transform: uppercase; margin-bottom: 30px; text-align: center; }
        .block-title span { color: var(--red); }
        .block-title::after { content: ''; display: block; width: 50px; height: 4px; background: var(--red); margin: 8px auto 0; border-radius: 10px; }

        /* Cuadros con imágenes completas */
        .card { background: var(--card); border-radius: 1.8rem; padding: 15px; border: 1px solid var(--border); transition: 0.3s; height: 100%; display: flex; flex-direction: column; align-items: center; }
        .card img { border-radius: 1.2rem; width: 100%; aspect-ratio: 16/9; object-fit: contain; background: rgba(0,0,0,0.03); }
        body.dark-mode .card img { background: rgba(255,255,255,0.03); }

        .pill { display: flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 50px; color: white; font-weight: 800; font-size: 11px; text-transform: uppercase; transition: 0.3s; }

        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 15px 25px; z-index: 5000; display: flex; align-items: center; justify-content: space-between; border-top: 4px solid var(--red); color: white; }
        
        /* Centrado Conócenos */
        .grid-conocenos { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; width: 100%; }
        .grid-conocenos .card-item { width: 300px; }
    </style>
</head>
<body>

    <button id="mode-btn" style="position:fixed; top:20px; right:20px; z-index:6000; background:var(--red); color:white; width:45px; height:45px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;">
        <i class="fas fa-moon" id="mode-icon"></i>
    </button>

    <audio id="main-stream" crossorigin="anonymous"></audio>

    <div class="hero">
        <div class="swiper main-swiper h-full w-full">
            <div class="swiper-wrapper" id="slider-target"></div>
        </div>
    </div>

    <header class="header-main">
        <div class="flex-1">
            <h1 class="font-black text-[38px] md:text-[95px] leading-[0.85] uppercase tracking-tighter">SPLENDOR<br><span class="text-[#ff0000]">DISCO.</span></h1>
        </div>
        <div class="heart-box">
            <img src="https://i.postimg.cc/85PR3cTQ/gvkgv.png">
        </div>
    </header>

    <main id="web-content" class="pt-20 px-4 max-w-7xl mx-auto w-full"></main>
    
    <footer class="text-center py-20 pb-40 text-[10px] font-bold opacity-50 uppercase">© 2026 SPLENDOR DISCO | LA MÁS VIRAL DEL PAÍS</footer>

    <div class="player-bar">
        <div class="flex items-center gap-4">
            <img src="https://i.postimg.cc/85PR3cTQ/gvkgv.png" class="w-12 h-12 rounded-lg object-contain bg-white/10">
            <div>
                <p class="font-bold text-[10px] uppercase truncate w-32">Splendor Live</p>
                <span class="text-red-500 text-[8px] font-black uppercase tracking-widest">En Vivo</span>
            </div>
        </div>
        <button id="play-btn" class="bg-[#ff0000] w-12 h-12 rounded-full text-white flex items-center justify-center text-xl shadow-lg shadow-red-500/20">
            <i class="fas fa-play" id="play-icon"></i>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const audio = document.getElementById('main-stream');
        const playBtn = document.getElementById('play-btn');
        const streamUrl = "https://miestacion.turadioonline.com.ar:8342/stream";

        playBtn.onclick = () => {
            if (audio.paused) {
                audio.src = streamUrl + "?t=" + Date.now();
                audio.play();
                document.getElementById('play-icon').className = 'fas fa-pause';
            } else {
                audio.pause();
                audio.src = "";
                document.getElementById('play-icon').className = 'fas fa-play';
            }
        };

        document.getElementById('mode-btn').onclick = () => {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('mode-icon');
            icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
        };

        async function loadData() {
            try {
                const res = await fetch('datos.json?v=' + Math.random());
                const data = await res.json();

                document.getElementById('slider-target').innerHTML = data.slider_principal.map(img => `<div class="swiper-slide"><img src="${img}"></div>`).join('');
                new Swiper('.main-swiper', { loop: true, effect: 'fade', autoplay: { delay: 5000 } });

                let finalHtml = '';

                // NOTICIAS
                const secNoticias = data.secciones.find(s => s.nombre === "NOTICIAS");
                if(secNoticias) finalHtml += renderSection(secNoticias, "noticias");

                // CONÓCENOS CENTRADO
                const secConocenos = data.secciones.find(s => s.nombre === "CONÓCENOS");
                if(secConocenos) {
                    finalHtml += `
                    <div class="mt-24">
                        <h2 class="block-title">${secConocenos.nombre} <span>${secConocenos.sub}</span></h2>
                        <div class="grid-conocenos">
                            ${secConocenos.items.map(item => `
                                <div class="card-item">
                                    <div class="card">
                                        <a href="${item.url}" target="_blank">
                                            <img src="${item.img}">
                                            <p class="mt-4 text-center text-[12px] font-black uppercase">${item.titulo}</p>
                                        </a>
                                    </div>
                                </div>`).join('')}
                        </div>
                    </div>`;
                }

                // REDES
                finalHtml += `
                <div class="mt-24 text-center">
                    <h2 class="block-title">Nuestras <span>Redes</span></h2>
                    <div class="flex flex-wrap justify-center gap-4 mt-8">
                        ${data.redes_pildoras.map(r => `<a href="${r.url}" target="_blank" class="pill" style="background:${r.color}"><i class="${r.icon} text-lg"></i> ${r.nombre}</a>`).join('')}
                    </div>
                </div>`;

                // VIRALES
                const secViral = data.secciones.find(s => s.nombre === "LO MÁS");
                if(secViral) finalHtml += renderSection(secViral, "viral");

                document.getElementById('web-content').innerHTML = finalHtml;

                ['noticias', 'viral'].forEach(id => {
                    new Swiper(`.s-${id}`, {
                        slidesPerView: 'auto',
                        spaceBetween: 25,
                        freeMode: { enabled: true, momentum: true },
                        grabCursor: true
                    });
                });

            } catch (err) { console.error(err); }
        }

        function renderSection(sec, id) {
            return `
            <div class="mt-24">
                <h2 class="block-title">${sec.nombre} <span>${sec.sub}</span></h2>
                <div class="swiper s-${id} !overflow-visible">
                    <div class="swiper-wrapper">
                        ${sec.items.map(item => `
                            <div class="swiper-slide" style="width:280px">
                                <div class="card">
                                    <a href="${item.url}" target="_blank">
                                        <img src="${item.img}">
                                        <p class="mt-4 text-center text-[11px] font-bold uppercase truncate w-full">${item.titulo}</p>
                                    </a>
                                </div>
                            </div>`).join('')}
                    </div>
                </div>
            </div>`;
        }

        window.onload = loadData;
    </script>
</body>
</html>
