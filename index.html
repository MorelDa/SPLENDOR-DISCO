<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Splendor Disco | Oficial</title>

    <meta property="og:title" content="Splendor Disco Oficial">
    <meta property="og:image" content="https://i.postimg.cc/bNNwX8jQ/LOGO-SPLENDOR-DISCO.png">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/bNNwX8jQ/LOGO-SPLENDOR-DISCO.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { --red: #ff0000; --bg: #ffffff; --text: #1a1a1a; --card: #f8f8f8; --border: rgba(0,0,0,0.08); }
        body.dark-mode { --bg: #0d0d0d; --text: #ffffff; --card: #1a1a1a; --border: rgba(255,255,255,0.1); }
        
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; transition: 0.3s; }
        
        /* HERO PROPORCIONAL CON DIFUMINADO */
        .hero { 
            width: 100%; height: auto; position: relative; line-height: 0;
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%); 
            -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%); 
        }
        .hero img { width: 100%; height: auto; object-fit: contain; }

        /* HEADER POSICIONADO ESTILO PREMIUM */
        .header-main { position: relative; margin-top: -100px; padding: 0 6%; display: flex; align-items: center; justify-content: center; gap: 20px; z-index: 100; }
        
        /* Caja del logo con estilo del código de referencia */
        .heart-box { 
            width: 140px; height: 140px; border-radius: 2.5rem; 
            border: 6px solid white; box-shadow: 0 20px 45px rgba(0,0,0,0.15); 
            overflow: hidden; background: white; flex-shrink: 0; 
        }
        .heart-box img { width: 100%; height: 100%; object-fit: contain; }
        
        @media (min-width: 1024px) { 
            .header-main { margin-top: -200px; gap: 60px; } 
            .heart-box { width: 400px; height: 400px; border-radius: 5.5rem; border: 15px solid white; } 
        }

        /* TÍTULOS DE BLOQUE IMPACTANTES */
        .block-title { font-size: 30px; font-weight: 900; text-transform: uppercase; margin-bottom: 30px; text-align: center; width: 100%; line-height: 1; }
        .block-title span { color: var(--red); }
        .block-title::after { content: ''; display: block; width: 60px; height: 5px; background: var(--red); margin: 10px auto 0; border-radius: 10px; }

        /* TARJETAS OPTIMIZADAS */
        .card { background: var(--card); border-radius: 1.8rem; padding: 12px; border: 1px solid var(--border); transition: 0.3s; }
        .card img { border-radius: 1.5rem; width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* REPRODUCTOR */
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 15px 25px; z-index: 5000; display: flex; align-items: center; justify-content: space-between; border-top: 4px solid var(--red); color: white; }

        /* SWIPER: EL SECRETO DE LA FLUIDEZ EXTREMA */
        .swiper-wrapper {
            transition-timing-function: cubic-bezier(0.1, 0.57, 0.1, 1) !important;
        }

        .pill { display: flex; align-items: center; gap: 8px; padding: 12px 28px; border-radius: 50px; color: white; font-weight: 800; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>

    <button id="mode-btn" style="position:fixed; top:20px; right:20px; z-index:6000; background:var(--red); color:white; width:45px; height:45px; border-radius:50%; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer;">
        <i class="fas fa-moon" id="mode-icon"></i>
    </button>

    <div class="hero">
        <div class="swiper main-swiper h-full w-full">
            <div class="swiper-wrapper" id="slider-target"></div>
        </div>
    </div>

    <header class="header-main">
        <div class="flex-1">
            <h1 class="font-black text-[35px] md:text-[95px] leading-[0.8] uppercase">SPLENDOR<br><span class="text-[#ff0000]">DISCO.</span></h1>
        </div>
        <div class="heart-box">
            <img src="https://i.postimg.cc/bNNwX8jQ/LOGO-SPLENDOR-DISCO.png" alt="Logo Principal">
        </div>
    </header>

    <main id="web-content" class="pt-10 px-4 max-w-7xl mx-auto w-full"></main>
    
    <footer class="text-center py-20 pb-40 text-[10px] font-bold opacity-50 uppercase">
        © 2026 SPLENDOR DISCO
    </footer>

    <div class="player-bar">
        <div class="flex items-center gap-4">
            <img src="https://i.postimg.cc/bNNwX8jQ/LOGO-SPLENDOR-DISCO.png" class="w-12 h-12 rounded-xl object-cover bg-white p-1">
            <div>
                <p class="font-bold text-[10px] uppercase truncate w-32">Splendor Live</p>
                <span class="text-red-500 text-[8px] font-black uppercase">En Directo</span>
            </div>
        </div>
        <button id="play-btn" class="bg-[#ff0000] w-12 h-12 rounded-full text-white flex items-center justify-center text-xl">
            <i class="fas fa-play" id="play-icon"></i>
        </button>
    </div>

    <audio id="main-stream" crossorigin="anonymous"></audio>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const audio = document.getElementById('main-stream');
        const playBtn = document.getElementById('play-btn');
        const streamUrl = "https://miestacion.turadioonline.com.ar:8342/stream";

        playBtn.onclick = () => {
            if (audio.paused) {
                audio.src = streamUrl + "?t=" + Date.now();
                audio.play();
                document.getElementById('play-icon').className = 'fas fa-pause';
            } else {
                audio.pause();
                audio.src = "";
                document.getElementById('play-icon').className = 'fas fa-play';
            }
        };

        document.getElementById('mode-btn').onclick = () => {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('mode-icon');
            icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
        };

        async function loadData() {
            try {
                const res = await fetch('datos.json?v=' + Math.random());
                const data = await res.json();

                // 1. Slider
                document.getElementById('slider-target').innerHTML = data.slider_principal.map(img => `
                    <div class="swiper-slide !w-full"><img src="${img}"></div>
                `).join('');
                
                new Swiper('.main-swiper', { loop: true, effect: 'fade', autoplay: { delay: 4500 }, autoHeight: true });

                let html = '';

                // 2. Noticias
                const secNoticias = data.secciones.find(s => s.nombre === "NOTICIAS");
                if(secNoticias) html += renderCarousel(secNoticias, "noticias");

                // 3. Conócenos
                const secConocenos = data.secciones.find(s => s.nombre === "CONÓCENOS");
                if(secConocenos) {
                    html += `
                    <div class="mt-16">
                        <h2 class="block-title">${secConocenos.nombre} <span>${secConocenos.sub}</span></h2>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
                            ${secConocenos.items.map(item => `
                                <div class="card">
                                    <a href="${item.url}" target="_blank">
                                        <img src="${item.img}">
                                        <p class="mt-3 text-center text-[10px] font-bold uppercase truncate">${item.titulo}</p>
                                    </a>
                                </div>`).join('')}
                        </div>
                    </div>`;
                }

                // 4. TV EN VIVO (Prioridad según instrucciones)
                if (data.url_tv) {
                    html += `
                    <div class="mt-20">
                        <h2 class="block-title">TV EN <span>VIVO</span></h2>
                        <div class="card overflow-hidden bg-black !p-0 aspect-video shadow-2xl">
                            <video id="tv-player" class="w-full h-full" controls playsinline poster="https://i.postimg.cc/bNNwX8jQ/LOGO-SPLENDOR-DISCO.png"></video>
                        </div>
                    </div>`;
                }

                // 5. Redes Sociales
                html += `
                <div class="mt-20 text-center">
                    <h2 class="block-title">Nuestras <span>Redes</span></h2>
                    <div class="flex flex-wrap justify-center gap-4 mt-6">
                        ${data.redes_pildoras.map(r => `
                            <a href="${r.url}" target="_blank" class="pill" style="background:${r.color}">
                                <i class="${r.icon}"></i> ${r.nombre}
                            </a>`).join('')}
                    </div>
                </div>`;

                // 6. Lo Más Viral (Con los 100 temas si están en el JSON)
                const secViral = data.secciones.find(s => s.nombre === "LO MÁS");
                if(secViral) html += renderCarousel(secViral, "viral");

                document.getElementById('web-content').innerHTML = html;

                // Inicializar TV si existe
                if (data.url_tv) {
                    const video = document.getElementById('tv-player');
                    if (Hls.isSupported()) { 
                        const hls = new Hls(); hls.loadSource(data.url_tv); hls.attachMedia(video); 
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) { 
                        video.src = data.url_tv; 
                    }
                }

                // --- CONFIGURACIÓN ULTRA FLUIDA PARA CARRUSELES ---
                ['noticias', 'viral'].forEach(id => {
                    new Swiper(`.s-${id}`, {
                        slidesPerView: 'auto',
                        spaceBetween: 15,
                        freeMode: {
                            enabled: true,
                            sticky: false,
                            momentum: true,
                            momentumRatio: 5,
                            momentumVelocityRatio: 2,
                            momentumBounce: false
                        },
                        grabCursor: true,
                        touchEventsTarget: 'container',
                        resistanceRatio: 0
                    });
                });

            } catch (e) { console.error("Error cargando datos:", e); }
        }

        function renderCarousel(sec, id) {
            return `
            <div class="mt-16">
                <h2 class="block-title">${sec.nombre} <span>${sec.sub}</span></h2>
                <div class="swiper s-${id} !overflow-visible">
                    <div class="swiper-wrapper">
                        ${sec.items.map(item => `
                            <div class="swiper-slide" style="width:230px">
                                <div class="card">
                                    <a href="${item.url}" target="_blank">
                                        <img src="${item.img}">
                                        <p class="mt-3 text-center text-[10px] font-black uppercase truncate">${item.titulo}</p>
                                    </a>
                                </div>
                            </div>`).join('')}
                    </div>
                </div>
            </div>`;
        }

        window.onload = loadData;
    </script>
</body>
</html>
